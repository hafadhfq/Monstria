<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monster Fight - Game Monster Battle Online</title>
    <link rel="stylesheet" href="style2.css">
    <style>
        /* Extra CSS khusus halaman login */
        .landing-bg {
            background: url('assets/ui/bg-login.jpg') center/cover no-repeat, var(--bg-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 360px;
            padding: 20px;
        }
        
        .logo-game {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo-game img {
            width: 200px;
            max-width: 80%;
            filter: drop-shadow(0 0 10px #ffd700);
        }
        
        .login-card {
            background: rgba(42, 24, 16, 0.95);
            border: 3px solid var(--border-gold);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        
        .tab-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: var(--bg-button);
            border: 2px solid #674112;
            border-radius: 6px;
            color: var(--text-light);
            font-weight: 700;
            cursor: pointer;
        }
        
        .tab-btn.active {
            background: #b98107;
            border-color: var(--border-gold);
        }
        
        .form-group {
            margin-bottom: 12px;
        }
        
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-gold);
            margin-bottom: 4px;
            font-weight: 700;
        }
        
        .form-input {
            width: 100%;
            padding: 10px;
            background: #1a0f08;
            border: 2px solid #8b5a2b;
            border-radius: 6px;
            color: var(--text-light);
            font-size: 14px;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--border-gold);
        }
        
        .footer-text {
            text-align: center;
            font-size: 11px;
            color: #bdb8b0;
            margin-top: 16px;
        }
        
        .footer-text a {
            color: var(--text-gold);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="landing-bg">
        <div class="login-container">
            <!-- Logo -->
            <div class="logo-game">
                <img src="assets/ui/logo.png" alt="Monster Fight">
                <h1 class="text-gold mt-2" style="text-shadow: 2px 2px 0 #000; font-size: 24px;">
                    MONSTER FIGHT
                </h1>
                <p class="text-muted text-sm">Battle • Collect • Evolve</p>
            </div>

            <!-- Login/Register Card -->
            <div class="login-card">
                <!-- Tab Login/Register -->
                <div class="tab-buttons">
                    <button class="tab-btn active" id="tab-login" onclick="showTab('login')">
                        LOGIN
                    </button>
