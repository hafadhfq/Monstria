<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster World</title>
    <!-- Pastikan link ke style.css kamu benar -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app">
        <!-- Navigasi Atas -->
        <nav class="site-nav">
            <div class="brand">
                <div class="brand-mark">M</div>
                <span class="brand-text">MONSTER WORLD</span>
            </div>
        </nav>

        <!-- Hero Section (Banner Utama) -->
        <div class="index-hero">
            <div class="hero-image">
                <div class="hero-title-box">
                    <h1 class="hero-title">MONSTER WORLD</h1>
                    <p class="hero-subtitle">Jelajahi Dunia, Kumpulkan Monster!</p>
                </div>
            </div>
        </div>

        <!-- Panel Informasi / Menu Utama -->
        <div class="home-section">
            <div class="home-section-head">
                <span class="home-section-title">Menu Utama</span>
            </div>
            
            <!-- Grid Menu (Sesuai CSS .home-menu-grid) -->
            <div class="home-menu-grid">
                <button class="home-menu-card">
                    <span class="home-menu-icon">⚔️</span>
                    <span class="home-menu-title">Battle</span>
                </button>
                <button class="home-menu-card">
                    <span class="home-menu-icon">🎒</span>
                    <span class="home-menu-title">Inventory</span>
                </button>
                <button class="home-menu-card">
                    <span class="home-menu-icon">✨</span>
                    <span class="home-menu-title">Summon</span>
                </button>
                <button class="home-menu-card">
                    <span class="home-menu-icon">📖</span>
                    <span class="home-menu-title">Encyclo</span>
                </button>
                <button class="home-menu-card">
                    <span class="home-menu-icon">⚙️</span>
                    <span class="home-menu-title">Setting</span>
                </button>
            </div>
        </div>

        <!-- Contoh Kartu Monster (Sesuai CSS .party-card) -->
        <div class="home-section">
            <div class="home-section-head">
                <span class="home-section-title">Party Kamu</span>
            </div>
            <div class="party-table-wrap">
                <table class="party-table">
                    <tr>
                        <td>
                            <div class="party-card element-fire">
                                <span class="monster-emoji-head">🐉</span>
                                <span class="tier-badge tier-R">R</span>
                                <span class="element-badge">🔥</span>
                                <span class="party-monster-name">Drako</span>
                                <span class="party-level">Lv.5</span>
                            </div>
                        </td>
                        <td>
                            <div class="party-card element-water">
                                <span class="monster-emoji-head">🐢</span>
                                <span class="tier-badge tier-U">U</span>
                                <span class="element-badge">💧</span>
                                <span class="party-monster-name">Aqua</span>
                                <span class="party-level">Lv.3</span>
                            </div>
                        </td>
                        <td>
                            <div class="party-card element-earth">
                                <span class="monster-emoji-head">🦍</span>
                                <span class="tier-badge tier-C">C</span>
                                <span class="element-badge">🌿</span>
                                <span class="party-monster-name">Gorok</span>
                                <span class="party-level">Lv.1</span>
                            </div>
                        </td>
                        <td>
                            <div class="party-card element-wind">
                                <span class="monster-emoji-head">🦅</span>
                                <span class="tier-badge tier-R">R</span>
                                <span class="element-badge">🌪️</span>
                                <span class="party-monster-name">Zephyr</span>
                                <span class="party-level">Lv.4</span>
                            </div>
                        </td>
                        <td>
                            <div class="party-card element-light">
                                <span class="monster-emoji-head">🦄</span>
                                <span class="tier-badge tier-E">E</span>
                                <span class="element-badge">✨</span>
                                <span class="party-monster-name">Luna</span>
                                <span class="party-level">Lv.7</span>
                            </div>
                        </td>
                    </tr>
                </table>
            </div>
        </div>

        <!-- Footer -->
        <footer class="site-footer">
            <strong>MONSTER WORLD</strong>
            <p>&copy; 2026 Monster World Game. All rights reserved.</p>
            <div class="footer-links">
                <a href="#">Terms</a>
                <a href="#">Privacy</a>
                <a href="#">Support</a>
            </div>
        </footer>
    </div>

</body>
</html>
