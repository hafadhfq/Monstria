<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Monster - Monstria</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .detail-split-container { display: grid; grid-template-columns: 3fr 7fr; gap: 12px; align-items: start; }
        .detail-visual-card { position: relative; width: 100%; aspect-ratio: 3/4; border-radius: 8px; border: 2px solid var(--gold3); overflow: hidden; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 4px 0 #1a1008; }
        .detail-emoji { font-size: 64px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.6)); z-index: 2; }
        .card-corner-badge { position: absolute; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; color: #fff8df; text-shadow: 0 1px 0 #000; z-index: 5; box-shadow: 0 2px 0 #1b1109; }
        .badge-rarity { top: 6px; right: 6px; }
        .badge-element { bottom: 6px; left: 6px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.3); }
        .stats-table-custom { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 5px; }
        .stats-table-custom td { padding: 6px; border-bottom: 1px solid rgba(168, 132, 77, 0.3); color: #4a321c; }
        .stats-table-custom td:first-child { font-weight: bold; color: #7c5a2d; width: 40%; }
        .stats-table-custom td:last-child { text-align: right; font-weight: bold; color: #3a271a; }
        .skill-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .skill-name { color: #4a321c; font-size: 12px; font-weight: bold; }
        .skill-level-tag { background: #4a3423; border: 1px solid var(--gold3); border-radius: 4px; color: var(--gold2); font-size: 9px; padding: 1px 5px; font-weight: bold; }
        
        /* Styling Bintang */
        .star-display { color: #ffcc00; letter-spacing: 2px; font-size: 14px; }
        .star-empty { color: #8a7a60; opacity: 0.5; }

        @media (max-width: 400px) { .detail-split-container { grid-template-columns: 1fr; } .detail-visual-card { max-width: 200px; margin: 0 auto; } }
    </style>
</head>
<body>
    <div class="app">
        <nav class="site-nav"><div class="brand"><div class="brand-mark">M</div><span class="brand-text">MONSTRIA</span></div></nav>
        <div class="owned-monster-panel">
            <div class="monster-title-bar">MONSTER INFORMATION</div>
            <div class="detail-split-container">
                <div class="detail-visual-card element-fire" id="monster-bg">
                    <span class="card-corner-badge badge-rarity tier-R" id="monster-tier">R</span>
                    <span class="detail-emoji" id="monster-icon">🐉</span>
                    <span class="card-corner-badge badge-element" id="monster-el-badge">🔥</span>
                </div>
                <div class="owned-info">
                    <h2 style="margin: 0 0 5px 0; color: #4a321c; font-family: 'MedievalSharp'; font-size: 18px;" id="monster-name">Drako The Red</h2>
                    <div class="star-display" id="monster-stars"></div>
                    <table class="stats-table-custom">
                        <tr><td>❤️ Level</td><td id="monster-level">15</td></tr>
                        <tr><td>🧬 Element</td><td id="monster-element">Fire</td></tr>
                        <tr><td>❤️ HP</td><td id="stat-hp">1200</td></tr>
                        <tr><td>⚔️ Attack</td><td id="stat-atk">350</td></tr>
                        <tr><td>🛡️ Defense</td><td id="stat-def">200</td></tr>
                        <tr><td>💨 Speed</td><td id="stat-spd">95</td></tr>
                    </table>
                    <div class="skill-box" style="margin-top: 10px;">
                        <div class="skill-header">
                            <span class="skill-name" id="skill-name">Flame Breath</span>
                            <span class="skill-level-tag" id="skill-level-display">Lvl. 1/5</span>
                        </div>
                        <div class="skill-effect" id="skill-desc">Menyerang semua musuh dengan api panas.</div>
                    </div>
                </div>
            </div>
            <div class="owned-action-row" style="margin-top: 15px;">
                <button class="btn btn-blue">LEVEL UP</button>
                <button class="btn btn-red">SELL</button>
            </div>
        </div>
        <button class="small-wap-btn" onclick="window.history.back()">⬅ KEMBALI</button>
        <footer class="site-footer"><strong>MONSTRIA</strong><p>&copy; 2026 Monstria Game Studio.</p></footer>
    </div>

    <script>
        // Database Statis (Contoh sebagian dari 200 entri)
        const monsters = {
            "1": { name: "Monster Fire-1", icon: "🐉", tier: "C", tierClass: "tier-C", el: "Fire", elIcon: "🔥", elClass: "element-fire", level: 5, stars: 1, maxStars: 1, hp: 500, atk: 100, def: 80, spd: 50, skillName: "Scratch", skillLvl: 1, maxSkillLvl: 3, skillDesc: "Serangan dasar." },
            "2": { name: "Monster Water-1 I", icon: "🐢", tier: "C", tierClass: "tier-C", el: "Water", elIcon: "💧", elClass: "element-water", level: 5, stars: 1, maxStars: 2, hp: 600, atk: 90, def: 120, spd: 40, skillName: "Bubble", skillLvl: 1, maxSkillLvl: 3, skillDesc: "Menyemburkan gelembung." },
            "3": { name: "Monster Water-1 II", icon: "🐢", tier: "C", tierClass: "tier-C", el: "Water", elIcon: "💧", elClass: "element-water", level: 15, stars: 2, maxStars: 2, hp: 900, atk: 150, def: 200, spd: 60, skillName: "Aqua Jet", skillLvl: 2, maxSkillLvl: 3, skillDesc: "Menyerang dengan kecepatan tinggi." },
            "4": { name: "Monster Earth-1 I", icon: "🦍", tier: "C", tierClass: "tier-C", el: "Earth", elIcon: "🌿", elClass: "element-earth", level: 5, stars: 1, maxStars: 3, hp: 700, atk: 110, def: 150, spd: 30, skillName: "Tackle", skillLvl: 1, maxSkillLvl: 4, skillDesc: "Menabrak musuh." },
            "5": { name: "Monster Earth-1 II", icon: "🦍", tier: "C", tierClass: "tier-C", el: "Earth", elIcon: "🌿", elClass: "element-earth", level: 15, stars: 2, maxStars: 3, hp: 1000, atk: 180, def: 250, spd: 45, skillName: "Rock Smash", skillLvl: 2, maxSkillLvl: 4, skillDesc: "Menghancurkan pertahanan." },
            "6": { name: "Monster Earth-1 III", icon: "🦍", tier: "C", tierClass: "tier-C", el: "Earth", elIcon: "🌿", elClass: "element-earth", level: 30, stars: 3, maxStars: 3, hp: 1500, atk: 250, def: 400, spd: 60, skillName: "Earthquake", skillLvl: 3, maxSkillLvl: 4, skillDesc: "Guncangan tanah hebat." }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id') || "1";
        const data = monsters[id];

        if (data) {
            document.getElementById('monster-name').innerText = data.name;
            document.getElementById('monster-icon').innerText = data.icon;
            document.getElementById('monster-tier').innerText = data.tier;
            document.getElementById('monster-tier').className = `card-corner-badge badge-rarity ${data.tierClass}`;
            document.getElementById('monster-el-badge').innerText = data.elIcon;
            document.getElementById('monster-bg').className = `detail-visual-card ${data.elClass}`;
            
            document.getElementById('monster-level').innerText = data.level;
            document.getElementById('monster-element').innerText = data.el;
            document.getElementById('stat-hp').innerText = data.hp;
            document.getElementById('stat-atk').innerText = data.atk;
            document.getElementById('stat-def').innerText = data.def;
            document.getElementById('stat-spd').innerText = data.spd;
            
            document.getElementById('skill-name').innerText = data.skillName;
            document.getElementById('skill-level-display').innerText = `Lvl. ${data.skillLvl}/${data.maxSkillLvl}`;
            document.getElementById('skill-desc').innerText = data.skillDesc;

            // LOGIKA BINTANG DINAMIS DENGAN KOSONGAN
            let starHTML = "";
            for (let i = 1; i <= data.maxStars; i++) {
                if (i <= data.stars) {
                    starHTML += "⭐";
                } else {
                    starHTML += "<span class='star-empty'>☆</span>";
                }
            }
            document.getElementById('monster-stars').innerHTML = starHTML;
        }
    </script>
</body>
</html>
