<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Monster - Monstria</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Layout Split 30:70 */
        .detail-split-container {
            display: grid;
            grid-template-columns: 3fr 7fr;
            gap: 12px;
            align-items: start;
        }

        /* Visual Card (Kiri) */
        .detail-visual-card {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            border-radius: 8px;
            border: 2px solid var(--gold3);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 4px 0 #1a1008;
        }

        .detail-emoji { font-size: 64px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.6)); z-index: 2; }
        
        .card-corner-badge {
            position: absolute; padding: 2px 6px; border-radius: 4px;
            font-weight: bold; font-size: 10px; color: #fff8df;
            text-shadow: 0 1px 0 #000; z-index: 5; box-shadow: 0 2px 0 #1a1008;
        }
        .badge-rarity { top: 6px; right: 6px; }
        .badge-element { bottom: 6px; left: 6px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.3); }

        /* Tabel Stats dengan Ikon (Kanan) */
        .stats-table-custom { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 5px; }
        .stats-table-custom td { padding: 6px; border-bottom: 1px solid rgba(168, 132, 77, 0.3); color: #4a321c; }
        .stats-table-custom td:first-child { font-weight: bold; color: #7c5a2d; width: 40%; }
        .stats-table-custom td:last-child { text-align: right; font-weight: bold; color: #3a271a; }
        
        /* Skill Box Styling */
        .skill-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .skill-name { color: #4a321c; font-size: 12px; font-weight: bold; }
        .skill-level-tag { 
            background: #4a3423; border: 1px solid var(--gold3); border-radius: 4px;
            color: var(--gold2); font-size: 9px; padding: 1px 5px; font-weight: bold;
        }

        @media (max-width: 400px) {
            .detail-split-container { grid-template-columns: 1fr; }
            .detail-visual-card { max-width: 200px; margin: 0 auto; }
        }
    </style>
</head>
<body>

    <div class="app">
        <nav class="site-nav">
            <div class="brand"><div class="brand-mark">M</div><span class="brand-text">MONSTRIA</span></div>
        </nav>

        <div class="owned-monster-panel">
            <div class="monster-title-bar">MONSTER INFORMATION</div>

            <div class="detail-split-container">
                <!-- SISI KIRI (30%): Visual -->
                <div class="detail-visual-card element-fire" id="monster-bg">
                    <span class="card-corner-badge badge-rarity tier-R" id="monster-tier">R</span>
                    <span class="detail-emoji" id="monster-icon">🐉</span>
                    <span class="card-corner-badge badge-element" id="monster-el-badge">🔥</span>
                </div>

                <!-- SISI KANAN (70%): Info & Stats -->
                <div class="owned-info">
                    <h2 style="margin: 0 0 5px 0; color: #4a321c; font-family: 'MedievalSharp'; font-size: 18px;" id="monster-name">Drako The Red</h2>
                    <div style="color: #b88620; font-size: 12px; margin-bottom: 8px;" id="monster-stars">⭐⭐⭐</div>

                    <!-- Tabel Stats dengan Ikon -->
                    <table class="stats-table-custom">
                        <tr><td>❤️ Level</td><td id="monster-level">15</td></tr>
                        <tr><td>🧬 Element</td><td id="monster-element">Fire</td></tr>
                        <tr><td>❤️ HP</td><td id="stat-hp">1200</td></tr>
                        <tr><td>⚔️ Attack</td><td id="stat-atk">350</td></tr>
                        <tr><td>🛡️ Defense</td><td id="stat-def">200</td></tr>
                        <tr><td>💨 Speed</td><td id="stat-spd">95</td></tr>
                    </table>

                    <!-- Skill Section -->
                    <div class="skill-box" style="margin-top: 10px;">
                        <div class="skill-header">
                            <span class="skill-name" id="skill-name">Flame Breath</span>
                            <span class="skill-level-tag" id="skill-level-display">Lvl. 1/5</span>
                        </div>
                        <div class="skill-effect" id="skill-desc">Menyerang semua musuh dengan api panas.</div>
                    </div>
                </div>
            </div>

            <div class="owned-action-row" style="margin-top: 15px;">
                <button class="btn btn-blue">LEVEL UP</button>
                <button class="btn btn-red">SELL</button>
            </div>
        </div>

        <button class="small-wap-btn" onclick="window.history.back()">⬅ KEMBALI</button>

        <footer class="site-footer">
            <strong>MONSTRIA</strong><p>&copy; 2026 Monstria Game Studio.</p>
        </footer>
    </div>

    <script>
        // Database Monster dengan Hidden Scaling Stats
        const monsters = {
            "1": { 
                name: "Drako The Red", icon: "🐉", tier: "R", tierClass: "tier-R", 
                el: "Fire", elIcon: "🔥", elClass: "element-fire", 
                level: 15, stars: "⭐⭐⭐", hp: 1200, atk: 350, def: 200, spd: 95, 
                skillName: "Flame Breath", skillLvl: 1, maxSkillLvl: 5,
                skillDesc: "Menyerang semua musuh dengan api panas.",
                // Stats tersirat untuk perhitungan damage nanti
                scaling: { dmgMult: 1.2, effectChance: 0.3 } 
            },
            "2": { 
                name: "Aqua Turtle", icon: "🐢", tier: "U", tierClass: "tier-U", 
                el: "Water", elIcon: "💧", elClass: "element-water", 
                level: 10, stars: "⭐⭐", hp: 1500, atk: 150, def: 400, spd: 40, 
                skillName: "Water Shield", skillLvl: 2, maxSkillLvl: 5,
                skillDesc: "Meningkatkan defense tim sebesar 20%.",
                scaling: { defBuff: 0.2, duration: 3 }
            },
            "3": { 
                name: "Luna Pegasus", icon: "🦄", tier: "E", tierClass: "tier-E", 
                el: "Light", elIcon: "✨", elClass: "element-light", 
                level: 25, stars: "⭐⭐⭐⭐", hp: 900, atk: 500, def: 150, spd: 120, 
                skillName: "Holy Ray", skillLvl: 1, maxSkillLvl: 5,
                skillDesc: "Serangan cahaya suci yang sangat kuat.",
                scaling: { dmgMult: 2.5, critRate: 0.5 }
            },
            "4": { 
                name: "Zephyr Eagle", icon: "🦅", tier: "R", tierClass: "tier-R", 
                el: "Wind", elIcon: "🌪️", elClass: "element-wind", 
                level: 18, stars: "⭐⭐⭐", hp: 800, atk: 400, def: 100, spd: 150, 
                skillName: "Gale Force", skillLvl: 3, maxSkillLvl: 5,
                skillDesc: "Serangan cepat beruntun ke target acak.",
                scaling: { hits: 3, dmgMult: 0.8 }
            },
            "5": { 
                name: "Gorok Titan", icon: "🦍", tier: "C", tierClass: "tier-C", 
                el: "Earth", elIcon: "🌿", elClass: "element-earth", 
                level: 8, stars: "⭐", hp: 1800, atk: 250, def: 300, spd: 30, 
                skillName: "Rock Throw", skillLvl: 1, maxSkillLvl: 5,
                skillDesc: "Melempar batu besar ke satu musuh.",
                scaling: { dmgMult: 1.5, stunChance: 0.2 }
            },
            "6": { 
                name: "Shadow Demon", icon: "👹", tier: "M", tierClass: "tier-M", 
                el: "Dark", elIcon: "🌑", elClass: "element-dark", 
                level: 50, stars: "⭐⭐⭐⭐⭐", hp: 2500, atk: 800, def: 500, spd: 110, 
                skillName: "Abyssal Void", skillLvl: 5, maxSkillLvl: 5,
                skillDesc: "Menghisap nyawa musuh untuk menyembuhkan diri.",
                scaling: { dmgMult: 3.0, healPercent: 0.5 }
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id') || "1";
        const data = monsters[id];

        if (data) {
            // Update Visuals
            document.getElementById('monster-name').innerText = data.name;
            document.getElementById('monster-icon').innerText = data.icon;
            document.getElementById('monster-tier').innerText = data.tier;
            document.getElementById('monster-tier').className = `card-corner-badge badge-rarity ${data.tierClass}`;
            document.getElementById('monster-el-badge').innerText = data.elIcon;
            document.getElementById('monster-bg').className = `detail-visual-card ${data.elClass}`;
            
            // Update Stats Table
            document.getElementById('monster-level').innerText = data.level;
            document.getElementById('monster-element').innerText = data.el;
            document.getElementById('monster-stars').innerText = data.stars;
            document.getElementById('stat-hp').innerText = data.hp;
            document.getElementById('stat-atk').innerText = data.atk;
            document.getElementById('stat-def').innerText = data.def;
            document.getElementById('stat-spd').innerText = data.spd;
            
            // Update Skill dengan Format Baru
            document.getElementById('skill-name').innerText = data.skillName;
            document.getElementById('skill-level-display').innerText = `Lvl. ${data.skillLvl}/${data.maxSkillLvl}`;
            document.getElementById('skill-desc').innerText = data.skillDesc;
        }
    </script>
</body>
</html>
