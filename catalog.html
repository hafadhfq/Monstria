<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog Monster - Monstria</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .evo-indicator {
            position: absolute; top: -5px; right: -5px;
            background: #fff; color: #3a271a; border: 1px solid #c8a96a;
            border-radius: 50%; width: 18px; height: 18px;
            font-size: 10px; display: grid; place-items: center;
            z-index: 10; box-shadow: 0 2px 0 #1b1109; font-weight: bold;
        }
        .locked-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.7);
            display: grid; place-items: center; z-index: 4;
        }
        .stage-badge {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #fff; padding: 2px 6px;
            border-radius: 4px; font-size: 9px; font-weight: bold; border: 1px solid #555;
        }
    </style>
</head>
<body>

    <div class="app">
        <nav class="site-nav">
            <div class="brand"><div class="brand-mark">M</div><span class="brand-text">MONSTRIA</span></div>
        </nav>

        <div class="encyclo-panel">
            <div class="encyclo-title-bar">MONSTER CATALOG</div>
            
            <div class="encyclo-info">
                Temukan semua tahap evolusi monster! (Total Entries: <span id="total-count">0</span>)
            </div>

            <!-- Filter -->
            <div class="encyclo-filter-group">
                <div class="encyclo-filter-row">
                    <button class="encyclo-filter-btn active">ALL</button>
                    <button class="encyclo-filter-btn">🔥 Fire</button>
                    <button class="encyclo-filter-btn">💧 Water</button>
                    <button class="encyclo-filter-btn">🌿 Earth</button>
                    <button class="encyclo-filter-btn">🌪️ Wind</button>
                    <button class="encyclo-filter-btn">✨ Light</button>
                    <button class="encyclo-filter-btn">🌑 Dark</button>
                </div>
            </div>

            <!-- Grid Container -->
            <div class="encyclo-grid" id="monster-grid"></div>

            <!-- Pagination -->
            <div class="encyclo-pagination">
                <button class="small-wap-btn" id="btn-prev" onclick="changePage(-1)">PREV</button>
                <span class="page-info" id="page-info">Page 1 / --</span>
                <button class="small-wap-btn" id="btn-next" onclick="changePage(1)">NEXT</button>
            </div>
        </div>

        <button class="btn btn-blue" onclick="window.location.href='dashboard.html'">KEMBALI KE DASHBOARD</button>

        <footer class="site-footer">
            <strong>MONSTRIA</strong><p>&copy; 2026 Monstria Game Studio.</p>
        </footer>
    </div>

    <script>
        // --- KONFIGURASI TIER & DISTRIBUSI MAX STAR ---
        const elements = ['fire', 'water', 'earth', 'wind', 'light', 'dark'];
        const icons = {'fire': '🐉', 'water': '🐢', 'earth': '🦍', 'wind': '🦅', 'light': '🦄', 'dark': '👹'};
        
        // Aturan: Dari 20 monster, berapa yang Max Star 1, 2, atau 3
        const tierRules = {
            'C': { count: 20, dist: { 1: 10, 2: 6, 3: 4 } }, // Total 34 entri
            'U': { count: 30, dist: { 1: 10, 2: 12, 3: 8 } }, // Total lebih banyak
            'R': { count: 40, dist: { 2: 20, 3: 20 } },       // Minimal max star 2
            'E': { count: 40, dist: { 3: 25, 4: 15 } },       // Minimal max star 3
            'L': { count: 30, dist: { 3: 10, 4: 20 } },       // Legend/Mythical max 4
            'M': { count: 20, dist: { 4: 20 } }                // Mythical pasti max 4
        };

        let allMonsters = [];
        let globalId = 1;

        // Fungsi Generate Monster Berdasarkan Aturan
        function generateMonsters() {
            for (const [tier, rule] of Object.entries(tierRules)) {
                let created = 0;
                
                // Loop untuk setiap kategori Max Star dalam tier tersebut
                for (const [maxStarStr, amount] of Object.entries(rule.dist)) {
                    const maxStar = parseInt(maxStarStr);
                    
                    for (let i = 0; i < amount; i++) {
                        if (created >= rule.count) break;
                        
                        let elIndex = (globalId + i) % 6;
                        let el = elements[elIndex];
                        let baseName = `${el.charAt(0).toUpperCase() + el.slice(1)}-${globalId}`;
                        
                        // Buat entri untuk setiap tahap evolusi (I, II, III, dst)
                        for (let stage = 1; stage <= maxStar; stage++) {
                            let displayName = baseName;
                            if (maxStar > 1) {
                                // Konversi angka ke Romawi sederhana untuk nama
                                const romans = ["", "I", "II", "III", "IV"];
                                displayName += ` ${romans[stage]}`;
                            }

                            // Simulasi Kepemilikan: Hanya ID rendah yang dimiliki
                            let owned = globalId <= 5; 

                            allMonsters.push({
                                id: globalId, // ID unik untuk link detail
                                uniqueId: `${globalId}-${stage}`, // ID unik untuk grid
                                name: displayName,
                                icon: icons[el],
                                element: el,
                                tier: tier,
                                stage: stage,
                                maxStage: maxStar,
                                owned: owned
                            });
                        }
                        globalId++;
                        created++;
                    }
                }
            }
            document.getElementById('total-count').innerText = allMonsters.length;
        }

        generateMonsters();

        // --- PAGINATION LOGIC ---
        let currentPage = 1;
        const itemsPerPage = 16;
        const totalPages = Math.ceil(allMonsters.length / itemsPerPage);

        function renderGrid() {
            const grid = document.getElementById('monster-grid');
            grid.innerHTML = "";

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = allMonsters.slice(start, end);

            pageItems.forEach(m => {
                let cardContent = "";
                
                if (m.owned) {
                    // Indikator Evolusi: Muncul jika stage saat ini < maxStage
                    let evoBadge = m.stage < m.maxStage ? `<div class="evo-indicator">⚡</div>` : "";
                    let stageBadge = m.maxStage > 1 ? `<div class="stage-badge">Stage ${m.stage}</div>` : "";
                    
                    cardContent = `
                        <a href="monster-detail.html?id=${m.id}&stage=${m.stage}" style="text-decoration:none;">
                            <div class="encyclo-card element-${m.element}">
                                ${evoBadge}
                                ${stageBadge}
                                <span class="encyclo-monster-icon">${m.icon}</span>
                                <span class="tier-badge tier-${m.tier}">${m.tier}</span>
                                <span class="element-badge">${icons[m.element]}</span>
                            </div>
                        </a>
                    `;
                } else {
                    cardContent = `
                        <div class="encyclo-card locked">
                            <div class="locked-overlay"></div>
                            <div class="encyclo-lock">🔒</div>
                        </div>
                    `;
                }
                grid.innerHTML += cardContent;
            });

            document.getElementById('page-info').innerText = `Page ${currentPage} / ${totalPages}`;
            document.getElementById('btn-prev').disabled = currentPage === 1;
            document.getElementById('btn-next').disabled = currentPage === totalPages;
            
            document.getElementById('btn-prev').style.opacity = currentPage === 1 ? "0.5" : "1";
            document.getElementById('btn-next').style.opacity = currentPage === totalPages ? "0.5" : "1";
        }

        function changePage(dir) {
            currentPage += dir;
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;
            renderGrid();
            window.scrollTo(0, 0);
        }

        renderGrid();
    </script>
</body>
</html>
