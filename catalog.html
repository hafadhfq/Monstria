<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog Monster - Monstria</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .evo-indicator {
            position: absolute; top: -5px; right: -5px;
            background: #fff; color: #3a271a; border: 1px solid #c8a96a;
            border-radius: 50%; width: 18px; height: 18px;
            font-size: 10px; display: grid; place-items: center;
            z-index: 10; box-shadow: 0 2px 0 #1b1109; font-weight: bold;
        }
        .locked-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.7);
            display: grid; place-items: center; z-index: 4;
        }
    </style>
</head>
<body>

    <div class="app">
        <nav class="site-nav">
            <div class="brand"><div class="brand-mark">M</div><span class="brand-text">MONSTRIA</span></div>
        </nav>

        <div class="encyclo-panel">
            <div class="encyclo-title-bar">MONSTER CATALOG (250)</div>
            
            <div class="encyclo-info">
                Koleksi lengkap spesies Monstria. Perhatikan potensi evolusinya!
            </div>

            <!-- Filter -->
            <div class="encyclo-filter-group">
                <div class="encyclo-filter-row">
                    <button class="encyclo-filter-btn active">ALL</button>
                    <button class="encyclo-filter-btn">🔥 Fire</button>
                    <button class="encyclo-filter-btn">💧 Water</button>
                    <button class="encyclo-filter-btn">🌿 Earth</button>
                    <button class="encyclo-filter-btn">🌪️ Wind</button>
                    <button class="encyclo-filter-btn">✨ Light</button>
                    <button class="encyclo-filter-btn">🌑 Dark</button>
                </div>
            </div>

            <!-- Grid Container -->
            <div class="encyclo-grid" id="monster-grid"></div>

            <!-- Pagination -->
            <div class="encyclo-pagination">
                <button class="small-wap-btn" id="btn-prev" onclick="changePage(-1)">PREV</button>
                <span class="page-info" id="page-info">Page 1 / 16</span>
                <button class="small-wap-btn" id="btn-next" onclick="changePage(1)">NEXT</button>
            </div>
        </div>

        <button class="btn btn-blue" onclick="window.location.href='dashboard.html'">KEMBALI KE DASHBOARD</button>

        <footer class="site-footer">
            <strong>MONSTRIA</strong><p>&copy; 2026 Monstria Game Studio.</p>
        </footer>
    </div>

    <script>
        // --- DATABASE GENERATOR DENGAN LOGIKA TIER ---
        const elements = ['fire', 'water', 'earth', 'wind', 'light', 'dark'];
        const icons = {'fire': '🐉', 'water': '🐢', 'earth': '🦍', 'wind': '🦅', 'light': '🦄', 'dark': '👹'};
        
        // Definisi Tier dan Probabilitas Evolusi
        const tierConfig = [
            { code: 'C', chance: 0 },   // Common: Tidak bisa evolusi
            { code: 'U', chance: 0 },   // Uncommon: Tidak bisa evolusi
            { code: 'R', chance: 0.2 }, // Rare: 20% bisa evolusi
            { code: 'E', chance: 0.5 }, // Epic: 50% bisa evolusi
            { code: 'L', chance: 0.8 }, // Legend: 80% bisa evolusi
            { code: 'M', chance: 1.0 }  // Mythical: 100% bisa evolusi
        ];

        let allMonsters = [];

        // Generate 250 Monster Data
        for (let i = 1; i <= 250; i++) {
            let elIndex = i % 6;
            let el = elements[elIndex];
            
            // Tentukan Tier secara acak tapi berbobot (lebih banyak C/U di awal)
            let tierIdx = Math.floor(Math.random() * tierConfig.length);
            if (i > 200) tierIdx = Math.max(tierIdx, 3); // Monster ID tinggi cenderung tier tinggi
            
            let currentTier = tierConfig[tierIdx];
            let canEvolveRaw = Math.random() < currentTier.chance;

            let name = `Monster ${el.charAt(0).toUpperCase() + el.slice(1)}-${i}`;
            let isStage2 = false;

            // Jika bisa evolusi dan ID-nya genap (simulasi sudah ada yang tahap 2)
            if (canEvolveRaw && i % 2 === 0 && i > 10) {
                name += " II";
                isStage2 = true;
            }

            // Simulasi status pemain
            let owned = i <= 25; // Pemain punya 25 monster pertama
            
            let stars = 1;
            let canEvolve = false;

            if (owned) {
                if (isStage2) {
                    stars = 3; // Tahap II biasanya bintang lebih penuh
                } else if (canEvolveRaw) {
                    stars = 1;
                    canEvolve = true; // Bisa evolusi tapi masih tahap 1
                } else {
                    stars = (i % 3) + 1; // Random 1-3 bintang untuk yang mentok
                }
            }

            allMonsters.push({
                id: i,
                name: name,
                icon: icons[el],
                element: el,
                tier: currentTier.code,
                owned: owned,
                stars: stars,
                canEvolve: canEvolve
            });
        }

        // --- PAGINATION LOGIC ---
        let currentPage = 1;
        const itemsPerPage = 16;
        const totalPages = Math.ceil(allMonsters.length / itemsPerPage);

        function renderGrid() {
            const grid = document.getElementById('monster-grid');
            grid.innerHTML = "";

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = allMonsters.slice(start, end);

            pageItems.forEach(m => {
                let cardContent = "";
                
                if (m.owned) {
                    // Tampilkan indikator petir jika bisa evolusi tapi belum
                    let evoBadge = m.canEvolve ? `<div class="evo-indicator">⚡</div>` : "";
                    let starStr = "⭐".repeat(m.stars);
                    
                    cardContent = `
                        <a href="monster-detail.html?id=${m.id}" style="text-decoration:none;">
                            <div class="encyclo-card element-${m.element}">
                                ${evoBadge}
                                <span class="encyclo-monster-icon">${m.icon}</span>
                                <span class="tier-badge tier-${m.tier}">${m.tier}</span>
                                <span class="element-badge">${icons[m.element]}</span>
                            </div>
                        </a>
                    `;
                } else {
                    cardContent = `
                        <div class="encyclo-card locked">
                            <div class="locked-overlay"></div>
                            <div class="encyclo-lock">🔒</div>
                        </div>
                    `;
                }
                grid.innerHTML += cardContent;
            });

            document.getElementById('page-info').innerText = `Page ${currentPage} / ${totalPages}`;
            document.getElementById('btn-prev').disabled = currentPage === 1;
            document.getElementById('btn-next').disabled = currentPage === totalPages;
            
            document.getElementById('btn-prev').style.opacity = currentPage === 1 ? "0.5" : "1";
            document.getElementById('btn-next').style.opacity = currentPage === totalPages ? "0.5" : "1";
        }

        function changePage(dir) {
            currentPage += dir;
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;
            renderGrid();
            window.scrollTo(0, 0);
        }

        renderGrid();
    </script>
</body>
</html>
