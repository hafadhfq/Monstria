<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog Monster - Monstria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app">
        <!-- Header -->
        <nav class="site-nav">
            <div class="brand">
                <div class="brand-mark">M</div>
                <span class="brand-text">MONSTRIA</span>
            </div>
        </nav>

        <!-- Panel Utama Encyclopedia -->
        <div class="encyclo-panel">
            <div class="encyclo-title-bar">MONSTER CATALOG</div>
            
            <div class="encyclo-info">
                Temukan dan kumpulkan semua spesies monster di dunia Monstria!
            </div>

            <!-- Filter Elemen -->
            <div class="encyclo-filter-group">
                <div class="encyclo-filter-label">FILTER BY ELEMENT</div>
                <div class="encyclo-filter-row">
                    <button class="encyclo-filter-btn active">ALL</button>
                    <button class="encyclo-filter-btn">🔥 Fire</button>
                    <button class="encyclo-filter-btn">💧 Water</button>
                    <button class="encyclo-filter-btn">🌿 Earth</button>
                    <button class="encyclo-filter-btn">🌪️ Wind</button>
                    <button class="encyclo-filter-btn">✨ Light</button>
                    <button class="encyclo-filter-btn">🌑 Dark</button>
                </div>
            </div>

            <!-- Grid Kartu Monster (Link ke Detail) -->
            <div class="encyclo-grid">
                
                <!-- Monster ID 1: Drako (Fire/Rare) -->
                <a href="monster-detail.html?id=1" style="text-decoration:none;">
                    <div class="encyclo-card element-fire">
                        <span class="encyclo-monster-icon">🐉</span>
                        <span class="tier-badge tier-R">R</span>
                        <span class="element-badge">🔥</span>
                    </div>
                </a>

                <!-- Monster ID 2: Aqua Turtle (Water/Uncommon) -->
                <a href="monster-detail.html?id=2" style="text-decoration:none;">
                    <div class="encyclo-card element-water">
                        <span class="encyclo-monster-icon">🐢</span>
                        <span class="tier-badge tier-U">U</span>
                        <span class="element-badge">💧</span>
                    </div>
                </a>

                <!-- Monster ID 3: Luna Pegasus (Light/Epic) -->
                <a href="monster-detail.html?id=3" style="text-decoration:none;">
                    <div class="encyclo-card element-light">
                        <span class="encyclo-monster-icon">🦄</span>
                        <span class="tier-badge tier-E">E</span>
                        <span class="element-badge">✨</span>
                    </div>
                </a>

                <!-- Monster Locked 1 -->
                <div class="encyclo-card locked">
                    <div class="encyclo-lock">🔒</div>
                </div>

                <!-- Monster ID 4: Zephyr (Wind/Rare) -->
                <a href="monster-detail.html?id=4" style="text-decoration:none;">
                    <div class="encyclo-card element-wind">
                        <span class="encyclo-monster-icon">🦅</span>
                        <span class="tier-badge tier-R">R</span>
                        <span class="element-badge">🌪️</span>
                    </div>
                </a>

                <!-- Monster Locked 2 -->
                <div class="encyclo-card locked">
                    <div class="encyclo-lock">🔒</div>
                </div>

                <!-- Monster ID 5: Gorok (Earth/Common) -->
                <a href="monster-detail.html?id=5" style="text-decoration:none;">
                    <div class="encyclo-card element-earth">
                        <span class="encyclo-monster-icon">🦍</span>
                        <span class="tier-badge tier-C">C</span>
                        <span class="element-badge">🌿</span>
                    </div>
                </a>

                <!-- Monster ID 6: Shadow Demon (Dark/Mythical) -->
                <a href="monster-detail.html?id=6" style="text-decoration:none;">
                    <div class="encyclo-card element-dark">
                        <span class="encyclo-monster-icon">👹</span>
                        <span class="tier-badge tier-M">M</span>
                        <span class="element-badge">🌑</span>
                    </div>
                </a>

            </div>

            <!-- Pagination -->
            <div class="encyclo-pagination">
                <button class="small-wap-btn disabled">PREV</button>
                <span class="page-info">Page 1 / 3</span>
                <button class="small-wap-btn">NEXT</button>
            </div>
        </div>

        <!-- Tombol Kembali ke Dashboard -->
        <button class="btn btn-blue" onclick="window.location.href='dashboard.html'">KEMBALI KE DASHBOARD</button>

        <!-- Footer -->
        <footer class="site-footer">
            <strong>MONSTRIA</strong>
            <p>&copy; 2026 Monstria Game Studio.</p>
        </footer>
    </div>

</body>
</html>
