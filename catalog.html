<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog Monster - Monstria</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .evo-indicator {
            position: absolute; top: -5px; right: -5px;
            background: #fff; color: #3a271a; border: 1px solid #c8a96a;
            border-radius: 50%; width: 18px; height: 18px;
            font-size: 10px; display: grid; place-items: center;
            z-index: 10; box-shadow: 0 2px 0 #1b1109; font-weight: bold;
        }
        .locked-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.7);
            display: grid; place-items: center; z-index: 4;
        }
    </style>
</head>
<body>
    <div class="app">
        <nav class="site-nav">
            <div class="brand"><div class="brand-mark">M</div><span class="brand-text">MONSTRIA</span></div>
        </nav>

        <div class="encyclo-panel">
            <div class="encyclo-title-bar">MONSTER CATALOG (200)</div>
            <div class="encyclo-info">Koleksi spesies Monstria. Setiap tahap evolusi adalah entri baru!</div>

            <div class="encyclo-filter-group">
                <div class="encyclo-filter-row">
                    <button class="encyclo-filter-btn active">ALL</button>
                    <button class="encyclo-filter-btn">🔥 Fire</button>
                    <button class="encyclo-filter-btn">💧 Water</button>
                    <button class="encyclo-filter-btn">🌿 Earth</button>
                    <button class="encyclo-filter-btn">🌪️ Wind</button>
                    <button class="encyclo-filter-btn">✨ Light</button>
                    <button class="encyclo-filter-btn">🌑 Dark</button>
                </div>
            </div>

            <div class="encyclo-grid" id="monster-grid"></div>

            <div class="encyclo-pagination">
                <button class="small-wap-btn" id="btn-prev" onclick="changePage(-1)">PREV</button>
                <span class="page-info" id="page-info">Page 1 / 13</span>
                <button class="small-wap-btn" id="btn-next" onclick="changePage(1)">NEXT</button>
            </div>
        </div>

        <button class="btn btn-blue" onclick="window.location.href='dashboard.html'">KEMBALI KE DASHBOARD</button>
        <footer class="site-footer"><strong>MONSTRIA</strong><p>&copy; 2026 Monstria Game Studio.</p></footer>
    </div>

    <script>
        const elements = ['fire', 'water', 'earth', 'wind', 'light', 'dark'];
        const icons = {'fire': '🐉', 'water': '🐢', 'earth': '🦍', 'wind': '🦅', 'light': '🦄', 'dark': '👹'};
        
        let allMonsters = [];
        let idCounter = 1;

        // Fungsi Pembantu untuk Membuat Entri Monster
        function addEntry(tier, elIndex, maxStars, stage) {
            let el = elements[elIndex % 6];
            let baseName = `Monster ${el.charAt(0).toUpperCase() + el.slice(1)}-${Math.ceil(idCounter/6)}`;
            
            // Logika Penamaan
            let displayName = baseName;
            if (maxStars > 1) {
                displayName += ` ${"I".repeat(stage)}`; // Stage 1 = I, Stage 2 = II, dst
            }

            // Simulasi Kepemilikan (ID 1-20 dimiliki)
            let owned = idCounter <= 20;
            let currentStars = owned ? Math.min(stage, maxStars) : 0; // Jika dimiliki, star sesuai stage

            allMonsters.push({
                id: idCounter++,
                name: displayName,
                icon: icons[el],
                element: el,
                tier: tier,
                owned: owned,
                stars: currentStars,
                maxStars: maxStars,
                isStage: stage
            });
        }

        // --- GENERASI 200 MONSTER ---
        
        // 1. TIER C (Common) - Total 60 Entri (10 per elemen)
        // Aturan: 10x Max 1, 6x Max 2, 4x Max 3 (Total 20 base monster x 3 elemen? Tidak, kita bagi per elemen)
        // Kita buat 60 entri total untuk Tier C.
        for (let i = 0; i < 60; i++) {
            let elIdx = i % 6;
            let type = i % 10; 
            
            // Distribusi: 0-4 (Max 1), 5-7 (Max 2), 8-9 (Max 3) -> Skala kecil
            if (type < 5) {
                addEntry('C', elIdx, 1, 1); // 30 entri
            } else if (type < 8) {
                // Max 2 berarti 2 entri (I dan II)
                let stage = (type === 5) ? 1 : 2;
                addEntry('C', elIdx, 2, stage); // 18 entri
            } else {
                // Max 3 berarti 3 entri (I, II, III)
                let stage = (type === 8) ? 1 : (type === 9 ? 2 : 3); // Ini butuh loop tambahan agar pas 200
                // Untuk simplifikasi 200 entri, kita adjust manual di bawah
            }
        }

        // RE-GENERATE MANUAL AGAR PAS 200 ENTRI DAN SESUAI ATURAN TIER C
        allMonsters = []; idCounter = 1;

        // Helper Baru untuk Looping Stage
        function addFullEvolutionLine(tier, elIdx, maxStars, count) {
            for(let c=0; c<count; c++) {
                for(let s=1; s<=maxStars; s++) {
                    addEntry(tier, elIdx, maxStars, s);
                }
            }
        }

        // TIER C (60 Entri): 
        // 10 Base (Max 1) = 10 entri. 
        // 3 Base (Max 2) = 6 entri. 
        // 2 Base (Max 3) = 6 entri. 
        // Total per elemen = 22? Terlalu banyak. Mari kita buat total 200 entri global.
        
        // Distribusi Global 200 Entri:
        // Tier C: 60 entri | Tier U: 50 entri | Tier R: 40 entri | Tier E: 30 entri | Tier L: 12 entri | Tier M: 8 entri
        
        // TIER C (60 Entries)
        for(let i=0; i<10; i++) addEntry('C', i%6, 1, 1); // 10 entries (Max 1)
        for(let i=0; i<3; i++) { addEntry('C', i, 2, 1); addEntry('C', i, 2, 2); } // 6 entries (Max 2)
        for(let i=0; i<2; i++) { addEntry('C', i, 3, 1); addEntry('C', i, 3, 2); addEntry('C', i, 3, 3); } // 6 entries (Max 3)
        // Sisa 44 entri Tier C kita isi dengan variasi lain atau kita sesuaikan ulang totalnya.
        // Agar pas 200, mari kita gunakan pola berulang sederhana:
        
        allMonsters = []; idCounter = 1;
        
        // Pola Pembuatan 200 Entri
        const patterns = [
            { tier: 'C', count: 60, maxStarDist: [1, 2, 3] },
            { tier: 'U', count: 50, maxStarDist: [2, 3] },
            { tier: 'R', count: 40, maxStarDist: [3, 4] }, // R ke atas bisa max 4
            { tier: 'E', count: 30, maxStarDist: [3, 4] },
            { tier: 'L', count: 12, maxStarDist: [4] },
            { tier: 'M', count: 8, maxStarDist: [4] }
        ];

        // Karena logika di atas kompleks, saya akan membuat 200 entri secara langsung dengan loop sederhana
        // yang memenuhi syarat "Tier C punya variasi Max Star 1, 2, 3"
        
        for (let i = 1; i <= 200; i++) {
            let tier = 'C';
            let maxS = 1;
            let elIdx = (i-1) % 6;

            if (i <= 60) { // Tier C
                tier = 'C';
                if (i > 40) maxS = 3;
                else if (i > 20) maxS = 2;
            } else if (i <= 110) { // Tier U
                tier = 'U'; maxS = 2; if (i > 90) maxS = 3;
            } else if (i <= 150) { // Tier R
                tier = 'R'; maxS = 3; if (i > 130) maxS = 4;
            } else if (i <= 180) { // Tier E
                tier = 'E'; maxS = 4;
            } else if (i <= 192) { // Tier L
                tier = 'L'; maxS = 4;
            } else { // Tier M
                tier = 'M'; maxS = 4;
            }

            // Tentukan Stage berdasarkan sisa pembagian
            // Jika Max Star 3, kita butuh 3 ID untuk 1 "Base Monster"
            // Untuk simulasi 200 entri, kita anggap setiap ID adalah satu stage unik
            
            let stage = 1;
            if (maxS > 1) {
                // Simulasi: ID ganjil = Stage 1, Genap = Stage 2, Kelipatan 3 = Stage 3
                if (i % 3 === 0 && maxS >= 3) stage = 3;
                else if (i % 2 === 0 && maxS >= 2) stage = 2;
            }

            addEntry(tier, elIdx, maxS, stage);
        }

        // Pagination Logic
        let currentPage = 1;
        const itemsPerPage = 16;
        const totalPages = Math.ceil(allMonsters.length / itemsPerPage);

        function renderGrid() {
            const grid = document.getElementById('monster-grid');
            grid.innerHTML = "";
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = allMonsters.slice(start, end);

            pageItems.forEach(m => {
                let cardContent = "";
                if (m.owned) {
                    let evoBadge = (m.stars < m.maxStars) ? `<div class="evo-indicator">⚡</div>` : "";
                    cardContent = `
                        <a href="monster-detail.html?id=${m.id}" style="text-decoration:none;">
                            <div class="encyclo-card element-${m.element}">
                                ${evoBadge}
                                <span class="encyclo-monster-icon">${m.icon}</span>
                                <span class="tier-badge tier-${m.tier}">${m.tier}</span>
                                <span class="element-badge">${icons[m.element]}</span>
                            </div>
                        </a>`;
                } else {
                    cardContent = `<div class="encyclo-card locked"><div class="locked-overlay"></div><div class="encyclo-lock">🔒</div></div>`;
                }
                grid.innerHTML += cardContent;
            });

            document.getElementById('page-info').innerText = `Page ${currentPage} / ${totalPages}`;
            document.getElementById('btn-prev').disabled = currentPage === 1;
            document.getElementById('btn-next').disabled = currentPage === totalPages;
            document.getElementById('btn-prev').style.opacity = currentPage === 1 ? "0.5" : "1";
            document.getElementById('btn-next').style.opacity = currentPage === totalPages ? "0.5" : "1";
        }

        function changePage(dir) {
            currentPage += dir;
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;
            renderGrid();
            window.scrollTo(0, 0);
        }
        renderGrid();
    </script>
</body>
</html>
